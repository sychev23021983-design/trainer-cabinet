version: '3.9'

services:
  backend:
    build: ./backend
    container_name: trainer-backend
    restart: unless-stopped
    ports:
      - "8030:3000"
    environment:
      - DATABASE_URL=file:./data/trainer.db
      - JWT_SECRET=${JWT_SECRET:-trainer_secret_change_in_prod}
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - trainer_data:/app/data
    depends_on: []

  frontend:
    build: ./frontend
    container_name: trainer-frontend
    restart: unless-stopped
    ports:
      - "8031:80"
    depends_on:
      - backend

volumes:
  trainer_data:
